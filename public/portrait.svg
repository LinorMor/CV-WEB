<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 540" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16203a"/>
      <stop offset="0.55" stop-color="#0e1320"/>
      <stop offset="1" stop-color="#090c15"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0dca6"/>
      <stop offset="0.5" stop-color="#d9b96b"/>
      <stop offset="1" stop-color="#c9a227"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="34%" r="55%">
      <stop offset="0" stop-color="#d9b96b" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d9b96b" stop-opacity="0"/>
    </radialGradient>
